<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arduino Web Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3a;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --success: #22c55e;
    --warn:    #f59e0b;
    --danger:  #ef4444;
    --accent:  #6366f1;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .topbar h1 { font-size: 1.1rem; font-weight: 600; }
  .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--muted); }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.25rem;
    padding: 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .card h2 {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .card p  { font-size: 0.95rem; }
  .small   { font-size: 0.82rem; color: var(--muted); }

  input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

  /* ── Servo visual ── */
  .servoArea { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-top: 0.25rem; }
  .servoDial {
    position: relative;
    width: 120px; height: 60px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 60px 60px 0 0;
    overflow: hidden;
  }
  .servoArm {
    position: absolute;
    bottom: 0; left: 50%;
    width: 4px; height: 52px;
    background: var(--accent);
    border-radius: 2px;
    transform-origin: bottom center;
    transform: translateX(-50%) rotate(0deg);
    transition: transform 0.1s ease;
  }
  .servoPivot {
    position: absolute;
    bottom: -6px; left: 50%;
    transform: translateX(-50%);
    width: 12px; height: 12px;
    background: var(--text);
    border-radius: 50%;
  }
  .servoReadout { font-size: 0.85rem; color: var(--muted); }

  /* ── IR badge ── */
  .ir-badge {
    display: inline-block;
    padding: 0.2rem 0.65rem;
    border-radius: 999px;
    font-size: 0.82rem;
    font-weight: 600;
    background: var(--border);
    color: var(--muted);
    transition: background 0.2s, color 0.2s;
  }
  .ir-badge.active { background: #450a0a; color: var(--danger); }

  /* ── Serial monitor ── */
  .serial-container {
    height: 200px;
    overflow-y: auto;
    background: #0a0c12;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    font-family: 'Courier New', monospace;
    font-size: 0.82rem;
    scroll-behavior: smooth;
  }

  .serial-message {
    padding: 0.2rem 0;
    border-bottom: 1px solid #1a1d27;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .serial-message.from-esp  { color: #a5f3fc; }
  .serial-message.from-web  { color: #86efac; }
  .serial-placeholder { color: var(--muted); font-style: italic; padding: 0.4rem 0; }

  /* ── Message input ── */
  .msg-row {
    display: flex;
    gap: 0.5rem;
  }
  .msg-input {
    flex: 1;
    padding: 0.45rem 0.7rem;
    background: #0a0c12;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 0.82rem;
    outline: none;
  }
  .msg-input:focus { border-color: var(--accent); }

  .btn-send {
    padding: 0.45rem 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn-send:hover { opacity: 0.85; }

  .btn-small {
    padding: 0.25rem 0.7rem;
    font-size: 0.78rem;
    background: var(--border);
    color: var(--text);
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-small:hover { background: var(--muted); }

  .serial-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .serial-legend {
    display: flex;
    gap: 0.75rem;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .legend-esp  { color: #a5f3fc; }
  .legend-web  { color: #86efac; }
</style>
</head>

<body>

<header class="topbar">
  <h1>Arduino Web Dashboard</h1>
  <div class="status">
    <span id="simDot" class="dot"></span>
    <span id="simText">Connecting…</span>
  </div>
</header>

<main class="container">

  <!-- SERVO CONTROL -->
  <section class="card">
    <h2>Servo Control</h2>
    <p>Set angle: <strong><span id="angleValue">90</span>°</strong></p>
    <input id="angleSlider" type="range" min="0" max="180" value="90" step="1">
    <div class="servoArea">
      <div class="servoDial">
        <div id="servoArm" class="servoArm"></div>
        <div class="servoPivot"></div>
      </div>
      <p class="servoReadout">ESP32 confirmed: <span id="servoAngle">—</span>°</p>
    </div>
  </section>

  <!-- IR SENSOR -->
  <section class="card">
    <h2>IR Sensor Status</h2>
    <p>Object Detected: <span id="irDetected" class="ir-badge">—</span></p>
    <p class="small">Raw value: <span id="irValue">—</span></p>
  </section>

  <!-- SERIAL MONITOR -->
  <section class="card">
    <h2>Serial Monitor</h2>

    <div class="serial-header">
      <div class="serial-legend">
        <span class="legend-esp">■ ESP32</span>
        <span class="legend-web">■ Web</span>
      </div>
      <button id="clearBtn" class="btn-small">Clear</button>
    </div>

    <div id="serialContainer" class="serial-container">
      <div id="serialMessages">
        <div class="serial-placeholder">No messages yet. Type below to send one.</div>
      </div>
    </div>

    <!-- Message input -->
    <div class="msg-row">
      <input id="msgInput" class="msg-input" type="text"
             placeholder="Type a message and press Enter or Send…" maxlength="200">
      <button id="sendBtn" class="btn-send">Send</button>
    </div>
  </section>

</main>

<script type="module">

import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, signInAnonymously, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getDatabase, ref, onValue, set }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Config ────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBlxLdiakI8Zv5gtRWtAcfwxTcW-XtGbTw",
  authDomain:        "sivi-arduino-database.firebaseapp.com",
  databaseURL:       "https://sivi-arduino-database-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "sivi-arduino-database",
  storageBucket:     "sivi-arduino-database.firebasestorage.app",
  messagingSenderId: "854752663108",
  appId:             "1:854752663108:web:b80bad680b96bb63478e11"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

// ── DOM ───────────────────────────────────────────────────────────
const simDot         = document.getElementById("simDot");
const simText        = document.getElementById("simText");
const angleSlider    = document.getElementById("angleSlider");
const angleValue     = document.getElementById("angleValue");
const servoArm       = document.getElementById("servoArm");
const servoAngle     = document.getElementById("servoAngle");
const irValue        = document.getElementById("irValue");
const irDetected     = document.getElementById("irDetected");
const serialMessages = document.getElementById("serialMessages");
const serialContainer= document.getElementById("serialContainer");
const clearBtn       = document.getElementById("clearBtn");
const msgInput       = document.getElementById("msgInput");
const sendBtn        = document.getElementById("sendBtn");

// ── Helpers ───────────────────────────────────────────────────────
const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));

function setStatus(state) {
  const map = {
    connecting:    ["var(--muted)",   "Connecting…"],
    waiting:       ["var(--warn)",    "Waiting for ESP32…"],
    connected:     ["var(--success)", "Connected to ESP32"],
    error:         ["var(--danger)",  "Auth failed — enable Anonymous Auth in Firebase Console"],
  };
  const [color, text] = map[state] || map.connecting;
  simDot.style.background = color;
  simText.innerText = text;
}

function applyServoUI(angle) {
  const a = clamp(Number(angle), 0, 180);
  servoArm.style.transform = `translateX(-50%) rotate(${a - 90}deg)`;
  servoAngle.innerText     = a;
  angleSlider.value        = a;
  angleValue.innerText     = a;
}

// ── Serial display ────────────────────────────────────────────────
function addMessage(text, source) {
  // Remove placeholder
  const ph = serialMessages.querySelector(".serial-placeholder");
  if (ph) ph.remove();

  const div = document.createElement("div");
  div.className = "serial-message " + (source === "web" ? "from-web" : "from-esp");

  // Prefix with who sent it
  const prefix = source === "web" ? "[Web] " : "[ESP32] ";
  div.textContent = prefix + text;

  serialMessages.appendChild(div);
  serialContainer.scrollTop = serialContainer.scrollHeight;
}

clearBtn.addEventListener("click", () => {
  serialMessages.innerHTML =
    '<div class="serial-placeholder">No messages yet. Type below to send one.</div>';
});

// ── Send message from web → Firebase ─────────────────────────────
function sendWebMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = "";

  // Show immediately in local UI
  addMessage(text, "web");

  // Write to Firebase — ESP32 will read this
  set(ref(db, "serial/message"), { text, source: "web" })
    .catch(e => console.error("Send error:", e));
}

sendBtn.addEventListener("click", sendWebMessage);
msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter") sendWebMessage();
});

// ── Firebase listeners ────────────────────────────────────────────
function setupListeners() {

  // Servo angle
  onValue(ref(db, "servo/angle"), snap => {
    const val = snap.val();
    if (val === null || val === undefined) return;
    setStatus("connected");
    applyServoUI(val);
  });

  // IR sensor
  onValue(ref(db, "ir"), snap => {
    const data = snap.val();
    if (!data) return;
    irValue.innerText = data.raw ?? "—";
    if (data.detected) {
      irDetected.textContent = "YES";
      irDetected.className   = "ir-badge active";
    } else {
      irDetected.textContent = "NO";
      irDetected.className   = "ir-badge";
    }
  });

  // Serial messages — only show ESP32-sent messages here
  // (web messages are shown immediately in sendWebMessage above)
  let lastEspMsg = "";
  onValue(ref(db, "serial/message"), snap => {
    const data = snap.val();
    if (!data || !data.text) return;

    // Only display messages from ESP32 (web messages already shown locally)
    if (data.source === "esp32" && data.text !== lastEspMsg) {
      lastEspMsg = data.text;
      addMessage(data.text, "esp32");
    }
  });
}

// ── Slider → Firebase ─────────────────────────────────────────────
let writeTimer = null;
angleSlider.addEventListener("input", () => {
  const angle = Number(angleSlider.value);
  angleValue.innerText = angle;
  applyServoUI(angle);
  clearTimeout(writeTimer);
  writeTimer = setTimeout(() => {
    set(ref(db, "servo/angle"), angle)
      .catch(e => console.error("Write error:", e));
  }, 80);
});

// ── Auth ──────────────────────────────────────────────────────────
setStatus("connecting");

signInAnonymously(auth).catch(err => {
  console.error("Auth error:", err);
  setStatus("error");
});

onAuthStateChanged(auth, user => {
  if (user) {
    setStatus("waiting");
    setupListeners();
  } else {
    setStatus("connecting");
  }
});

</script>
</body>
</html>
